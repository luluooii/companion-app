<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Companion</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{--bg:#0a0a0c;--surface:#141418;--border:#232329;--text-primary:#e8e6e3;--text-secondary:#8a8a8f;--text-dim:#555560;--accent:#7c9caa;--user-bubble:#1a2530;--radius:18px;--safe-bottom:env(safe-area-inset-bottom,0px)}
  html,body{height:100%;overflow:hidden;font-family:'Noto Sans SC',-apple-system,sans-serif;font-weight:300;background:var(--bg);color:var(--text-primary);-webkit-font-smoothing:antialiased}
  #app{display:flex;flex-direction:column;height:100dvh}
  .header{flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:16px 20px;padding-top:calc(16px + env(safe-area-inset-top,0px));border-bottom:1px solid var(--border);background:var(--bg);position:relative}
  .header-title{font-size:15px;font-weight:400;letter-spacing:.5px;color:var(--text-secondary)}
  .header-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:8px;animation:pulse 3s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  .header-clear{position:absolute;right:20px;background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;padding:4px 8px;border-radius:8px}
  .messages{flex:1;overflow-y:auto;padding:20px 16px;-webkit-overflow-scrolling:touch}
  .messages::-webkit-scrollbar{display:none}
  .msg{display:flex;margin-bottom:16px;animation:msgIn .3s ease-out}
  @keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .msg.user{justify-content:flex-end}.msg.ai{justify-content:flex-start}
  .msg-bubble{max-width:82%;padding:12px 16px;border-radius:var(--radius);font-size:15px;line-height:1.7;word-break:break-word;white-space:pre-wrap}
  .msg.user .msg-bubble{background:var(--user-bubble);border-bottom-right-radius:6px}
  .msg.ai .msg-bubble{background:transparent;border-bottom-left-radius:6px;padding-left:4px}
  .typing-indicator{display:inline-flex;align-items:center;gap:4px;padding:12px 16px}
  .typing-indicator span{width:4px;height:4px;border-radius:50%;background:var(--text-dim);animation:blink 1.4s infinite}
  .typing-indicator span:nth-child(2){animation-delay:.2s}
  .typing-indicator span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.2}30%{opacity:1}}
  .time-divider{text-align:center;padding:12px 0;font-size:12px;color:var(--text-dim)}
  .input-area{flex-shrink:0;padding:12px 16px;padding-bottom:calc(12px + var(--safe-bottom));border-top:1px solid var(--border);background:var(--bg);display:flex;align-items:flex-end;gap:10px}
  .input-wrap{flex:1;display:flex;align-items:flex-end;background:var(--surface);border-radius:22px;border:1px solid var(--border);padding:6px 16px;transition:border-color .2s}
  .input-wrap:focus-within{border-color:var(--accent)}
  .input-wrap textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text-primary);font-family:inherit;font-size:15px;font-weight:300;line-height:1.5;resize:none;max-height:120px;padding:6px 0}
  .input-wrap textarea::placeholder{color:var(--text-dim)}
  .send-btn{flex-shrink:0;width:40px;height:40px;border-radius:50%;border:none;background:var(--accent);color:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.4;pointer-events:none;transition:all .2s}
  .send-btn.active{opacity:1;pointer-events:auto}
  .send-btn:active{transform:scale(.92)}
  .send-btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-dim);text-align:center;padding:40px;gap:12px}
  .welcome-icon{font-size:36px;margin-bottom:8px}
  .welcome-text{font-size:14px;line-height:1.8;max-width:260px}
  .toast{position:fixed;top:calc(20px + env(safe-area-inset-top,0px));left:50%;transform:translateX(-50%) translateY(-100px);background:#2a1a1a;color:#e88;padding:10px 20px;border-radius:12px;font-size:13px;border:1px solid #3a2020;transition:transform .3s;z-index:100}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .config-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;backdrop-filter:blur(4px)}
  .config-overlay.show{display:flex;align-items:flex-end}
  .config-panel{width:100%;background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px;padding-bottom:calc(24px + var(--safe-bottom));animation:slideUp .3s ease}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .config-panel h3{font-size:16px;font-weight:400;margin-bottom:20px}
  .config-field{margin-bottom:16px}
  .config-field label{display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px}
  .config-field input{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text-primary);font-family:'SF Mono','Fira Code',monospace;font-size:13px;outline:none}
  .config-field input:focus{border-color:var(--accent)}
  .config-save{width:100%;padding:12px;background:var(--accent);border:none;border-radius:12px;color:var(--bg);font-size:15px;font-weight:400;cursor:pointer;margin-top:8px}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-dot"></div>
    <span class="header-title" id="headerTitle">Companion</span>
    <button class="header-clear" id="btnConfig">设置</button>
  </div>
  <div class="messages" id="msgContainer">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🦉</div>
      <div class="welcome-text">我在这里<br>随时可以开始</div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="inputField" rows="1" placeholder="说点什么..."></textarea>
    </div>
    <button class="send-btn" id="btnSend">
      <svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
    </button>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="config-overlay" id="configOverlay">
  <div class="config-panel">
    <h3>连接配置</h3>
    <div class="config-field"><label>Bot ID</label><input type="text" id="cfgBotId" placeholder="输入 Bot ID"></div>
    <div class="config-field"><label>API Token (PAT)</label><input type="password" id="cfgToken" placeholder="输入个人访问令牌"></div>
    <div class="config-field"><label>显示名称</label><input type="text" id="cfgName" placeholder="给它一个名字"></div>
    <button class="config-save" id="btnSaveConfig">保存</button>
  </div>
</div>
<script>
const STORAGE_KEY='companion_config',LAST_ACTIVE_KEY='companion_last_active',CONV_ID_KEY='companion_conv_id';
const USER_ID='user_'+(localStorage.getItem('companion_uid')||(()=>{const id=Date.now().toString();localStorage.setItem('companion_uid',id);return id})());
let config=loadConfig(),conversationId=localStorage.getItem(CONV_ID_KEY)||'',isStreaming=false;
function loadConfig(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)return JSON.parse(r)}catch(e){}return{botId:'',token:'',name:'Companion'}}
function saveConfig(c){config=c;localStorage.setItem(STORAGE_KEY,JSON.stringify(c));document.getElementById('headerTitle').textContent=c.name||'Companion'}
document.getElementById('headerTitle').textContent=config.name||'Companion';
if(!config.botId||!config.token)setTimeout(()=>toggleConfig(true),500);
document.getElementById('cfgBotId').value=config.botId||'';
document.getElementById('cfgToken').value=config.token||'';
document.getElementById('cfgName').value=config.name||'';
document.getElementById('btnConfig').addEventListener('click',()=>toggleConfig(true));
document.getElementById('configOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)toggleConfig(false)});
document.getElementById('btnSaveConfig').addEventListener('click',()=>{
  const b=document.getElementById('cfgBotId').value.trim(),t=document.getElementById('cfgToken').value.trim(),n=document.getElementById('cfgName').value.trim();
  if(!b||!t){showToast('请填写 Bot ID 和 Token');return}
  saveConfig({botId:b,token:t,name:n||'Companion'});toggleConfig(false)});
function toggleConfig(s){document.getElementById('configOverlay').classList.toggle('show',s)}
const inputField=document.getElementById('inputField'),btnSend=document.getElementById('btnSend');
inputField.addEventListener('input',()=>{inputField.style.height='auto';inputField.style.height=Math.min(inputField.scrollHeight,120)+'px';btnSend.classList.toggle('active',inputField.value.trim().length>0)});
inputField.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey&&!e.isComposing){e.preventDefault();sendMessage()}});
btnSend.addEventListener('click',sendMessage);
function formatTime(d){return d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',hour12:false})}
function formatTimeDiff(ms){const m=Math.floor(ms/60000),h=Math.floor(m/60),d=Math.floor(h/24);if(d>0)return`${d}天${h%24}小时`;if(h>0)return`${h}小时${m%60}分钟`;if(m>0)return`${m}分钟`;return'刚刚'}
function getTimeDiffText(){const l=localStorage.getItem(LAST_ACTIVE_KEY);if(!l)return null;const d=Date.now()-parseInt(l);if(d<60000)return null;return formatTimeDiff(d)}
function updateLastActive(){localStorage.setItem(LAST_ACTIVE_KEY,Date.now().toString())}
const msgContainer=document.getElementById('msgContainer');let lastMessageTime=null;
function addTimeDivider(date){const now=new Date(),isToday=date.toDateString()===now.toDateString(),text=isToday?formatTime(date):`${date.getMonth()+1}/${date.getDate()} ${formatTime(date)}`;if(lastMessageTime&&(date-lastMessageTime)<300000)return;const div=document.createElement('div');div.className='time-divider';div.textContent=text;msgContainer.appendChild(div);lastMessageTime=date}
function hideWelcome(){const w=document.getElementById('welcome');if(w)w.style.display='none'}
function addMessage(role,text){hideWelcome();addTimeDivider(new Date());const m=document.createElement('div');m.className=`msg ${role}`;const b=document.createElement('div');b.className='msg-bubble';b.textContent=text;m.appendChild(b);msgContainer.appendChild(m);scrollToBottom();return b}
function addStreamingMessage(){hideWelcome();addTimeDivider(new Date());const m=document.createElement('div');m.className='msg ai';const b=document.createElement('div');b.className='msg-bubble';const t=document.createElement('div');t.className='typing-indicator';t.id='typing';t.innerHTML='<span></span><span></span><span></span>';b.appendChild(t);m.appendChild(b);msgContainer.appendChild(m);scrollToBottom();return b}
function scrollToBottom(){requestAnimationFrame(()=>{msgContainer.scrollTop=msgContainer.scrollHeight})}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
async function sendMessage(){
  const text=inputField.value.trim();if(!text||isStreaming)return;
  if(!config.botId||!config.token){showToast('请先配置 Bot ID 和 Token');toggleConfig(true);return}
  inputField.value='';inputField.style.height='auto';btnSend.classList.remove('active');
  addMessage('user',text);
  const timeDiff=getTimeDiffText(),now=new Date(),timeStr=now.toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  let ctx=`[当前时间: ${timeStr}]`;if(timeDiff)ctx+=` [距离上次对话已过去: ${timeDiff}]`;
  isStreaming=true;const bubble=addStreamingMessage();
  try{await streamChat(`${ctx}\n${text}`,bubble)}catch(err){console.error(err);const t=document.getElementById('typing');if(t)t.remove();bubble.textContent='连接出了点问题，再试一次？';showToast(err.message||'请求失败')}
  isStreaming=false;updateLastActive()}
async function streamChat(message,bubble){
  const body={bot_id:config.botId,user_id:USER_ID,stream:true,auto_save_history:true,additional_messages:[{role:'user',content:message,content_type:'text'}]};
  if(conversationId)body.conversation_id=conversationId;
  const response=await fetch('/api/chat',{method:'POST',headers:{'Authorization':`Bearer ${config.token}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!response.ok)throw new Error(`API 错误: ${response.status}`);
  const reader=response.body.getReader(),decoder=new TextDecoder();
  let buffer='',fullText='',typingRemoved=false,currentEvent='';

  while(true){
    const{done,value}=await reader.read();
    if(done)break;
    buffer+=decoder.decode(value,{stream:true});
    const lines=buffer.split('\n');
    buffer=lines.pop()||'';

    for(const line of lines){
      if(line.startsWith('event:')){
        currentEvent=line.slice(6).trim();
        continue;
      }
      if(line.startsWith('data:')){
        const d=line.slice(5).trim();
        if(d==='[DONE]')continue;
        try{
          const data=JSON.parse(d);

          // Capture conversation_id from any event
          if(data.conversation_id){
            conversationId=data.conversation_id;
            localStorage.setItem(CONV_ID_KEY,conversationId);
          }

          // Only process delta events for streaming text
          if(currentEvent==='conversation.message.delta'&&data.type==='answer'&&data.content){
            if(!typingRemoved){
              const t=document.getElementById('typing');
              if(t)t.remove();
              typingRemoved=true;
            }
            fullText+=data.content;
            bubble.textContent=fullText;
            scrollToBottom();
          }
        }catch(e){}
      }
    }
  }
  if(!typingRemoved){const t=document.getElementById('typing');if(t)t.remove();if(!fullText)bubble.textContent='...'}
}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')updateLastActive()});
updateLastActive();
</script>
</body>
</html>
